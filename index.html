<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provigood — Boost your food business in, from and to Vietnam</title>
  <meta name="description" content="Provigood is a Ho Chi Minh City–based consulting and trading company specialized in food, beverage, FMCG and hospitality.">
  <meta name="robots" content="index, follow">

  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">

  <!-- Multilingual alternates -->
  <link rel="alternate" hreflang="en" href="https://provigood.com/en/" />
  <link rel="alternate" hreflang="fr" href="https://provigood.com/fr/" />
  <link rel="alternate" hreflang="vi" href="https://provigood.com/vi/" />
  <link rel="alternate" hreflang="x-default" href="https://provigood.com/en/" />

  <!-- JS redirect (preferred) — runs immediately, picks the user's language -->
  <script>
    (function () {
      var supported = ['en', 'fr', 'vi'];
      var fallback = 'en';

      function pick() {
        var langs = (navigator.languages && navigator.languages.length)
          ? navigator.languages
          : [navigator.language || navigator.userLanguage || ''];
        for (var i = 0; i < langs.length; i++) {
          var primary = (langs[i] || '').toLowerCase().split('-')[0];
          if (supported.indexOf(primary) !== -1) return primary;
        }
        return fallback;
      }

      var lang = pick();
      // Preserve any query string or hash on the way through.
      // Use a relative path so it works both on the canonical domain and on
      // GitHub Pages where the project lives under /provigood-prototype/.
      var suffix = window.location.search + window.location.hash;
      window.location.replace(lang + '/' + suffix);
    })();
  </script>

  <!-- No-JS fallback: send everyone to English after a beat -->
  <meta http-equiv="refresh" content="0; url=en/">
</head>
<body>
  <p style="font-family: system-ui, sans-serif; max-width: 480px; margin: 80px auto; padding: 0 20px; text-align: center; color: #4a4a4a; line-height: 1.6;">
    Redirecting to your preferred language…
    <br><br>
    <a href="en/" style="color: #E91E63; font-weight: 600; text-decoration: none;">Continue in English</a>
    &nbsp;·&nbsp;
    <a href="fr/" style="color: #E91E63; font-weight: 600; text-decoration: none;">Continuer en français</a>
    &nbsp;·&nbsp;
    <a href="vi/" style="color: #E91E63; font-weight: 600; text-decoration: none;">Tiếp tục bằng tiếng Việt</a>
  </p>
</body>
</html>
